<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue website ↔ Penpot fidelity comparison</title>
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; background: #172033; color: white; font: 14px/1.4 system-ui, sans-serif; }
      header { position: sticky; top: 0; z-index: 2; display: grid; grid-template-columns: 1fr 1fr; background: #172033; }
      header div { padding: 10px 16px; border-right: 1px solid #42506a; }
      main { display: grid; grid-template-columns: 1fr 1fr; align-items: start; }
      img { display: block; width: 100%; height: auto; background: white; }
    </style>
  </head>
  <body>
    <header>
      <div>Live Vue website · 1728 × 7224</div>
      <div>Penpot board · 1728 × 7224</div>
    </header>
    <main>
      <img src="./01-live-website.png" alt="Live Vue website" />
      <img src="./03-penpot-after.png" alt="Penpot website board" />
    </main>
  </body>
</html>
